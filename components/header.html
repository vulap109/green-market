<header class="sticky top-0 z-[100] bg-white border-b border-gray-100 shadow-sm">
    <div class="bg-[#004e29] text-white py-2 px-4 text-[11px] font-bold">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex gap-6">
                <span><i class="fa-solid fa-phone mr-1"></i> Hotline: <a href="tel:0973074063">0973 074 063</a></span>
                <span><i class="fa-solid fa-truck mr-1"></i> Giao hàng trong ngày — Đặt trước 14h</span>
            </div>
            <div class="flex gap-4 items-center">
                <span><i class="fa-solid fa-location-dot mr-1"></i> TP. Hồ Chí Minh</span>
                <span class="border-l border-white/20 pl-4 uppercase">VI | EN</span>
            </div>
        </div>
    </div>
    <div class="max-w-7xl mx-auto px-4 py-3 sm:h-24 sm:py-0 flex justify-between items-center gap-4">
        <div id="mobile-header-menu-wrap" class="relative flex items-center gap-3">
            <button id="mobile-header-toggle" type="button" onclick="toggleMobileHeaderMenu()"
                class="lg:hidden inline-flex h-11 w-11 items-center justify-center rounded-full border border-gray-200 bg-white text-gray-700 shadow-sm transition hover:border-primary hover:text-primary"
                aria-label="Mo menu dieu huong" aria-controls="mobile-header-menu" aria-expanded="false">
                <i id="mobile-header-open-icon" class="fa-solid fa-bars text-base"></i>
                <i id="mobile-header-close-icon" class="fa-solid fa-xmark hidden text-lg"></i>
            </button>
            <a href="/" class="flex items-center group">
                <div class="p-2 rounded-lg group-hover:rotate-[360deg] duration-500 transition-all">
                     <img src="../images/logo_1.png" alt="logo_1" />
                </div>
                <div class="leading-none">
                     <img src="../images/logo_2.png" alt="logo_2" />
                </div>
            </a>
            <div id="mobile-header-menu"
                class="hidden lg:hidden absolute left-0 top-full mt-3 w-72 max-w-[calc(100vw-2rem)] rounded-2xl border border-gray-100 bg-white p-4 shadow-xl">
                <nav class="flex flex-col gap-1 font-bold text-[11px] uppercase tracking-widest text-gray-500">
                    <a href="all-products.html?q=khuyen-mai" onclick="closeMobileHeaderMenu()"
                        class="rounded-xl px-3 py-3 text-red-500 transition hover:bg-red-50 hover:text-red-600">Khuyến Mãi Hot</a>
                    <a href="all-products.html?q=gio-qua-trai-cay" onclick="closeMobileHeaderMenu()"
                        class="rounded-xl px-3 py-3 transition hover:bg-green-50 hover:text-primary">Giỏ Quà Trái Cây</a>
                    <a href="all-products.html?q=qua-tang-thuc-pham" onclick="closeMobileHeaderMenu()"
                        class="rounded-xl px-3 py-3 transition hover:bg-green-50 hover:text-primary">Quà Tặng Thực Phẩm</a>
                    <a href="all-products.html?q=trai-cay-nhap-khau" onclick="closeMobileHeaderMenu()"
                        class="rounded-xl px-3 py-3 transition hover:bg-green-50 hover:text-primary">Trái Cây</a>
                </nav>
            </div>
        </div>
        <nav class="hidden lg:flex space-x-8 font-bold text-[11px] uppercase tracking-widest text-gray-500">
            <a href="all-products.html?q=khuyen-mai" class="hover:text-primary transition text-red-500">Khuyến Mãi Hot</a>
            <a href="all-products.html?q=gio-qua-trai-cay" class="hover:text-primary transition">Giỏ Quà Trái Cây</a>
            <a href="all-products.html?q=qua-tang-thuc-pham" class="hover:text-primary transition">Quà Tặng Thực Phẩm</a>
            <a href="all-products.html?q=trai-cay-nhap-khau" class="hover:text-primary transition">Trái Cây</a>
        </nav>

        <div class="flex shrink-0 items-center gap-4 text-gray-600 md:gap-6">
            <div onclick="appNotify('Mở tài khoản')"
                class="flex items-center gap-2 cursor-pointer hover:text-primary transition">
                <i class="fa-regular fa-user text-xl"></i>
                <span class="text-[10px] font-black uppercase hidden md:block">Tài
                    khoản</span>
            </div>
            <div onclick="appNotify('Mở thanh tìm kiếm')"
                class="relative flex items-center gap-2 cursor-pointer group hover:text-primary transition">
                <i class="fa-solid fa-magnifying-glass text-xl"></i>
                <span class="text-[10px] font-black uppercase hidden md:block">Tìm
                    kiếm</span>
            </div>
            <div onclick="redirectToCart()"
                class="relative flex items-center gap-2 cursor-pointer group hover:text-primary transition">
                <i class="fa-solid fa-basket-shopping text-2xl"></i>
                <span id="cart-badge"
                    class="cart-badge hidden absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center border-2 border-white">0</span>
                <span class="text-[10px] font-black uppercase hidden md:block">Giỏ
                    hàng</span>
            </div>
        </div>
    </div>
</header>
